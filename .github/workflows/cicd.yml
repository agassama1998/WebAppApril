name: CI/CD - Build, Test, Docker Push

on:
 push:
  branches: [ "main" ]

jobs:
   build-test-docker:
    runs-on: ubuntu-latest

    steps:
    # 1️⃣ Checkout code
    - name: Checkout repository
      uses: actions/checkout@v4

  # 2️⃣ Setup .NET
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
       dotnet-version: 8.0.x

  # 3️⃣ Restore dependencies
    - name: Restore
      run: dotnet restore

  # 4️⃣ Build project
    - name: Build
      run: dotnet build --no-restore --configuration Release

  # 5️⃣ Run tests (safe even if none exist)
    - name: Test
      run: dotnet test --no-build --configuration Release --verbosity normal || echo "No tests found"

  # 6️⃣ Setup Docker Buildx
    - name: Setup Docker Buildx
      uses: docker/setup-buildx-action@v2

  # 7️⃣ Login to Docker Hub
    - name: Docker Login
      uses: docker/login-action@v2
      with:
       username: ${{ secrets.DOCKERHUBUSERNAME }}
       password: ${{ secrets.DOCKERHUBPASSWORD }}

  # 8️⃣ Build and Push Image
    - name: Build and Push Docker Image
      uses: docker/build-push-action@v4
      with:
       context: .
       push: true
       tags: |
         ${{ secrets.DOCKERHUBUSERNAME }}/webappapril:latest
         ${{ secrets.DOCKERHUBUSERNAME }}/webappapril:${{ github.sha }}
 
   deploy:
    runs-on: ubuntu-latest
    needs: build-test-docker
    env:
      IMAGE_NAME: ${{ secrets.DOCKERHUBUSERNAME }}/webappapril
    

    steps:
      - name: Debug SSH key
        run: |
          echo "Key length: $(echo '${{ secrets.SSH_PRIVATE_KEY }}' | wc -c)"
          echo "Key starts with: $(echo '${{ secrets.SSH_PRIVATE_KEY }}' | head -c 30)"
          echo "Key ends with: $(echo '${{ secrets.SSH_PRIVATE_KEY }}' | tail -c 30)"

      - name: Deploy to Ubuntu server via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }} # Replace with your server's IP address or hostname
          username: ${{ secrets.SERVER_USER }} # Replace with your server's SSH username eg. ubuntu
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          debug: true
          script: |
            # Pull the latest image
            docker pull ${{ env.IMAGE_NAME }}:latest

            # Stop and remove existing container (if running)
            docker stop webappapril || true
            docker rm webappapril || true

            # Run the new container
            docker run -d \
              --name webappapril \
              --restart unless-stopped \
              -p 8080:8080 \
              -e ASPNETCORE_ENVIRONMENT=Production \
              ${{ env.IMAGE_NAME }}:latest

            # Clean up old images
            docker image prune -f
