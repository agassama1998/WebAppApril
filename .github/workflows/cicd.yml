name: .NET CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Setup .NET
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      # 3. Restore
      - name: Restore
        run: dotnet restore

      # 4. Build
      - name: Build
        run: dotnet build WebAppApril.csproj --no-restore --configuration Release

      # 5. Test
      - name: Test
        run: dotnet test --no-build --configuration Release || echo "No tests found"

      # 6. Docker login
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUBUSERNAME }}
          password: ${{ secrets.DOCKERHUBPASSWORD }}

      # 7. Build & Push
      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUBUSERNAME }}/webappapril:latest
            ${{ secrets.DOCKERHUBUSERNAME }}/webappapril:${{ github.sha }}

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to Ubuntu via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            echo "🚀 Pulling latest image..."
            docker pull ${{ secrets.DOCKERHUBUSERNAME }}/webappapril:latest

            echo "🛑 Stopping old container..."
            docker stop webappapril || true
            docker rm webappapril || true

            echo "🚀 Running new container..."
            docker run -d \
              --name webappapril \
              --restart unless-stopped \
              -p 8080:8080 \
              -e ASPNETCORE_URLS=http://+:8080 \
              -e ASPNETCORE_ENVIRONMENT=Production \
              ${{ secrets.DOCKERHUBUSERNAME }}/webappapril:latest

            echo "🧹 Cleaning old images..."
            docker image prune -f