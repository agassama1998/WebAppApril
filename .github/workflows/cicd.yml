name: .NET CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build WebAppApril.csproj --no-restore --configuration Release

      - name: Test
        run: dotnet test --no-build --configuration Release || echo "No tests found"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUBUSERNAME }}
          password: ${{ secrets.DOCKERHUBPASSWORD }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUBUSERNAME }}/webappapril:latest
            ${{ secrets.DOCKERHUBUSERNAME }}/webappapril:${{ github.sha }}

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to Ubuntu server via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            docker pull ${{ secrets.DOCKERHUBUSERNAME }}/webappapril:latest
            docker stop webappapril || true
            docker rm webappapril || true
            docker run -d --name webappapril --restart unless-stopped -p 8080:80 -e ASPNETCORE_ENVIRONMENT=Production ${{ secrets.DOCKERHUBUSERNAME }}/webappapril:latest
            docker image prune -f
